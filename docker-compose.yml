services:
  volet:
    build: ./app
    container_name: volet-roulant
    ports:
      - "8080:8080"
    environment:
      # Remplacez par l'IP locale de votre ESP32
      - ESP32_URL=http://192.168.1.100
    volumes:
      - volet_data:/app/data
    restart: unless-stopped
    network_mode: bridge

volumes:
  volet_data:
