<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volet Roulant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf6;
    --muted: #8892b0;
    --blue: #4f9cf9;
    --blue-dim: rgba(79,156,249,0.15);
    --green: #43d9ad;
    --red: #f47067;
    --amber: #ffa657;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  #clock {
    font-size: 13px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    margin-bottom: 28px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.online   { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.opening  { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: pulse 1s infinite; }
  .dot.closing  { background: var(--blue);  box-shadow: 0 0 6px var(--blue);  animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #status-text { font-size: 15px; font-weight: 500; }
  #status-detail { font-size: 12px; color: var(--muted); margin-top: 4px; }
  #status-current { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 4px;
  }

  .btn {
    padding: 14px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: rgba(255,255,255,0.2); background: #2a2f47; }
  .btn:active { transform: scale(0.97); }
  .btn-icon { font-size: 22px; }

  .btn.open  { border-color: rgba(67,217,173,0.3); }
  .btn.open:hover  { border-color: var(--green); background: rgba(67,217,173,0.1); }
  .btn.close { border-color: rgba(79,156,249,0.3); }
  .btn.close:hover { border-color: var(--blue);  background: rgba(79,156,249,0.1); }
  .btn.stop  { border-color: rgba(244,112,103,0.3); }
  .btn.stop:hover  { border-color: var(--red);   background: rgba(244,112,103,0.1); }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #toast {
    position: fixed; top: 20px; right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    transform: translateY(-80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.ok   { border-color: rgba(67,217,173,0.4); color: var(--green); }
  #toast.err  { border-color: rgba(244,112,103,0.4); color: var(--red); }

  .sched-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--blue); }

  .field.full { grid-column: 1 / -1; }
  .field-inline { display:flex; align-items:center; gap:10px; }
  .field-inline input[type="checkbox"] { width:auto; margin:0; }
  .field-inline input[type="number"] { flex:1; }

  .btn-add {
    width: 100%;
    padding: 10px;
    background: var(--blue-dim);
    border: 1px solid rgba(79,156,249,0.3);
    border-radius: 8px;
    color: var(--blue);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .btn-add:hover { background: rgba(79,156,249,0.25); }

  .sched-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }

  .sched-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    gap: 10px;
  }
  .sched-item.disabled { opacity: 0.45; }

  .sched-info { flex: 1; }
  .sched-time { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .sched-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge.open  { background: rgba(67,217,173,0.15); color: var(--green); }
  .badge.close { background: rgba(79,156,249,0.15);  color: var(--blue); }
  .badge.once  { background: rgba(255,166,87,0.15); color: var(--amber); }

  .sched-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .icon-btn.del:hover { border-color: var(--red); color: var(--red); }

  .empty { text-align: center; font-size: 13px; color: var(--muted); padding: 20px 0; }

  input[type=file] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  input[type=file]::file-selector-button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    margin-right: 10px;
  }
  #ota-status { margin-top: 10px; font-size: 12px; color: var(--muted); min-height: 16px; }

  .speed-row { margin-top: 14px; }
  .speed-row label { font-size: 11px; color: var(--muted); }
  .speed-controls { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .speed-controls input[type=range] { flex: 1; accent-color: var(--blue); cursor: pointer; height: 4px; }
  #speed-pct { font-size: 14px; font-weight: 700; min-width: 42px; text-align: right; font-variant-numeric: tabular-nums; color: var(--blue); }

  .cmd-row { display: flex; gap: 10px; align-items: stretch; margin-top: 12px; }
  .cmd-row .btn-row { flex: 1; margin-top: 0; }

  .meter-col { display: flex; flex-direction: column; gap: 8px; }
  #spike-panel, #imax-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    min-width: 76px;
    text-align: center;
    gap: 3px;
    flex: 1;
  }
  #spike-value, #imax-value {
    font-size: 17px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--amber);
    line-height: 1.2;
  }
  #imax-value { color: var(--red); }
  #spike-label, #imax-label { font-size: 10px; color: var(--muted); }
</style>
</head>
<body>

<h1>Volet Roulant</h1>
<p class="subtitle">Contrôle & programmation</p>
<p id="clock"></p>

<div id="toast"></div>

<!-- Contrôle en direct -->
<div class="card">
  <div class="card-title">État & commandes</div>
  <div class="status-row">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Connexion...</span>
  </div>
  <div id="status-detail"></div>
  <div id="status-current"></div>
  <div class="speed-row">
    <label>Vitesse moteur</label>
    <div class="speed-controls">
      <input type="range" id="speed-slider" min="0" max="100" step="5" value="100" oninput="onSpeedChange()">
      <span id="speed-pct">100%</span>
    </div>
  </div>
  <div class="cmd-row">
    <div class="btn-row">
      <button class="btn open"  onclick="cmd('open')">
        <span class="btn-icon">&#8593;</span>Ouvrir
      </button>
      <button class="btn stop"  onclick="cmd('stop')">
        <span class="btn-icon">&#9632;</span>Stop
      </button>
      <button class="btn close" onclick="cmd('close')">
        <span class="btn-icon">&#8595;</span>Fermer
      </button>
    </div>
    <div class="meter-col">
      <div id="spike-panel">
        <div id="spike-value">—</div>
        <div id="spike-label">Pic démarrage</div>
      </div>
      <div id="imax-panel">
        <div id="imax-value">—</div>
        <div id="imax-label">Imax régime</div>
      </div>
    </div>
  </div>
</div>

<!-- Configuration ESP32 -->
<div class="card">
  <div class="card-title">Configuration ESP32</div>
  <div class="sched-form">
    <div class="field full" class="field-inline">
      <input type="checkbox" id="c-stop-time" checked>
      <label for="c-stop-time" style="margin:0">Arrêt par durée (s)</label>
      <input type="number" id="c-travel" placeholder="ex: 15" min="1" max="120" step="0.5">
    </div>
    <div class="field full" class="field-inline">
      <input type="checkbox" id="c-stop-cur-open">
      <label for="c-stop-cur-open" style="margin:0">Arrêt courant montée (mA)</label>
      <input type="number" id="c-thr-open" placeholder="ex: 800" min="50" max="8000">
    </div>
    <div class="field full" class="field-inline">
      <input type="checkbox" id="c-stop-cur-close">
      <label for="c-stop-cur-close" style="margin:0">Arrêt courant descente (mA)</label>
      <input type="number" id="c-thr-close" placeholder="ex: 800" min="50" max="8000">
    </div>
    <div class="field full" class="field-inline">
      <input type="checkbox" id="c-soft-start">
      <label for="c-soft-start" style="margin:0">Démarrage progressif (soft-start)</label>
    </div>
  </div>
  <button class="btn-add" onclick="saveConfig()">Enregistrer la configuration</button>
  <div id="config-current" style="margin-top:12px;font-size:12px;color:var(--muted)"></div>
  <button class="btn-add" onclick="rebootEsp32()" style="margin-top:10px;background:rgba(244,112,103,0.12);border-color:rgba(244,112,103,0.3);color:var(--red)">Redémarrer l'ESP32</button>
</div>

<!-- Retry config -->
<div class="card">
  <div class="card-title">Retry (tâches planifiées)</div>
  <div class="field-row">
    <div class="field">
      <label>Tentatives</label>
      <input type="number" id="retry-retries" min="1" max="10" value="3">
    </div>
    <div class="field">
      <label>Délai entre tentatives (s)</label>
      <input type="number" id="retry-delay" min="1" max="60" value="5">
    </div>
  </div>
  <button class="btn-add" onclick="saveRetryConfig()" style="margin-top:10px">Enregistrer</button>
  <div id="retry-status" style="margin-top:8px;font-size:12px;color:var(--muted);min-height:16px"></div>
</div>

<!-- OTA Firmware -->
<div class="card">
  <div class="card-title">Mise à jour firmware (OTA)</div>
  <div class="field full">
    <label>Fichier .bin — Arduino IDE → Sketch → Export Compiled Binary</label>
    <input type="file" id="ota-file" accept=".bin">
  </div>
  <button class="btn-add" id="ota-btn" onclick="uploadOTA()" style="margin-top:10px">Flasher le firmware</button>
  <div id="ota-status"></div>
</div>

<!-- Programmation -->
<div class="card">
  <div class="card-title">Programmation</div>
  <div class="sched-form">
    <div class="field">
      <label>Heure</label>
      <input type="time" id="s-time" value="08:00">
    </div>
    <div class="field">
      <label>Action</label>
      <select id="s-action">
        <option value="open">Ouvrir</option>
        <option value="close">Fermer</option>
      </select>
    </div>
    <div class="field full">
      <label>Type</label>
      <select id="s-type" onchange="toggleSchedType()">
        <option value="recurring">Récurrent</option>
        <option value="once">Une seule fois</option>
      </select>
    </div>
    <div class="field full" id="s-days-row">
      <label>Jours</label>
      <select id="s-days">
        <option value="*">Tous les jours</option>
        <option value="mon,tue,wed,thu,fri">Semaine (lun-ven)</option>
        <option value="sat,sun">Week-end</option>
        <option value="mon">Lundi</option>
        <option value="tue">Mardi</option>
        <option value="wed">Mercredi</option>
        <option value="thu">Jeudi</option>
        <option value="fri">Vendredi</option>
        <option value="sat">Samedi</option>
        <option value="sun">Dimanche</option>
      </select>
    </div>
    <div class="field full" id="s-date-row" style="display:none">
      <label>Date</label>
      <input type="date" id="s-date">
    </div>
    <div class="field full">
      <label>Label (optionnel)</label>
      <input type="text" id="s-label" placeholder="ex: Réveil matin">
    </div>
  </div>
  <button class="btn-add" onclick="addSchedule()">+ Ajouter ce programme</button>
  <div class="sched-list" id="sched-list"><div class="empty">Aucun programme</div></div>
</div>

<script>
const DAYS_LABELS = {
  '*': 'Tous les jours',
  'mon,tue,wed,thu,fri': 'Lun–Ven',
  'sat,sun': 'Week-end',
  mon:'Lun', tue:'Mar', wed:'Mer', thu:'Jeu', fri:'Ven', sat:'Sam', sun:'Dim'
};

function toggleSchedType() {
  const once = document.getElementById('s-type').value === 'once';
  document.getElementById('s-days-row').style.display = once ? 'none' : '';
  document.getElementById('s-date-row').style.display = once ? '' : 'none';
  if (once && !document.getElementById('s-date').value) {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('s-date').value = tomorrow.toISOString().slice(0, 10);
  }
}

let esp32Ip = null;

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2500);
}

const SPIKE_POLLS = 7;
const SPIKE_INTERVAL_MS = 220;
const CURRENT_POLL_MS = 500;

function renderCurrent(d) {
  document.getElementById('status-current').textContent =
    d.current_mA !== undefined
      ? `Courant : ${d.current_mA.toFixed(0)} mA · ${d.voltage_V.toFixed(1)} V`
      : '';
}

function renderImax(d) {
  const el = document.getElementById('imax-value');
  el.textContent = (d.max_current_mA !== undefined && d.max_current_mA > 0)
    ? Math.round(d.max_current_mA) + ' mA'
    : '—';
}

let curPolling = false;
async function pollCurrent() {
  if (curPolling) return;            // évite l'empilement si l'ESP32 répond lentement
  curPolling = true;
  try {
    const d = await api('/api/status');
    if (d.state !== 'offline') { renderCurrent(d); renderImax(d); }
  } catch {} finally {
    curPolling = false;
  }
}

function setSpeedDisplay(pct) {
  document.getElementById('speed-slider').value = pct;
  document.getElementById('speed-pct').textContent = pct + '%';
}

function rssiHtml(rssi, fw) {
  const color = rssi >= -55 ? 'var(--green)' : rssi >= -70 ? 'var(--amber)' : 'var(--red)';
  const icon  = rssi >= -55 ? '▲▲▲' : rssi >= -70 ? '▲▲·' : '▲··';
  return `<span style="color:${color};font-variant-numeric:tabular-nums;" title="${rssi} dBm">${icon} ${rssi} dBm</span>${fw}`;
}

let speedTimer = null;
function onSpeedChange() {
  const pct = parseInt(document.getElementById('speed-slider').value);
  setSpeedDisplay(pct);
  clearTimeout(speedTimer);
  speedTimer = setTimeout(() => {
    api('/api/esp32/config', 'POST', { motor_speed: pct })
      .then(() => toast('Vitesse : ' + pct + '%'))
      .catch(() => toast('Erreur vitesse', 'err'));
  }, 600);
}

async function trackSpike() {
  const el = document.getElementById('spike-value');
  el.textContent = '…';
  el.style.color = 'var(--muted)';
  let max = 0;
  for (let i = 0; i < SPIKE_POLLS; i++) {
    await new Promise(r => setTimeout(r, SPIKE_INTERVAL_MS));
    try {
      const d = await api('/api/status');
      const v = d.spike_current_mA !== undefined ? d.spike_current_mA : d.current_mA;
      if (v !== undefined && v > max) {
        max = v;
        el.textContent = Math.round(max) + ' mA';
        el.style.color = 'var(--amber)';
      }
    } catch {}
  }
  if (max === 0) { el.textContent = '—'; el.style.color = 'var(--muted)'; }
}

async function cmd(action) {
  try {
    await api('/api/control/' + action);
    toast({ open:'Ouverture...', close:'Fermeture...', stop:'Arrêt' }[action]);
    setTimeout(refreshStatus, 800);
    if (action === 'open' || action === 'close') trackSpike();
  } catch(e) {
    toast('Erreur : ESP32 inaccessible', 'err');
  }
}

async function refreshStatus() {
  try {
    const d = await api('/api/status');
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    const det = document.getElementById('status-detail');
    if (d.state === 'offline') {
      dot.className = 'dot';
      txt.textContent = 'ESP32 hors ligne';
      det.textContent = "Vérifiez le WiFi et l'IP dans docker-compose.yml";
      renderCurrent(d);
    } else {
      dot.className = 'dot ' + (d.state === 'stopped' ? 'online' : d.state);
      txt.textContent = { stopped:'En attente', opening:'Ouverture en cours', closing:'Fermeture en cours' }[d.state] || d.state;
      if (d.ip) esp32Ip = d.ip;
      const fw = d.firmware ? ` · fw ${d.firmware}` : '';
      det.innerHTML = d.ip ? `ESP32 · ${d.ip} · ${rssiHtml(d.rssi, fw)}` : '';
      renderCurrent(d);
      renderImax(d);
    }
  } catch {
    document.getElementById('status-dot').className = 'dot';
    document.getElementById('status-text').textContent = 'Hors ligne';
  }
}

async function loadSchedules() {
  const list = await api('/api/schedules');
  const el = document.getElementById('sched-list');
  if (!list.length) { el.innerHTML = '<div class="empty">Aucun programme</div>'; return; }
  el.innerHTML = list.map(s => {
    const time = `${String(s.hour).padStart(2,'0')}:${String(s.minute).padStart(2,'0')}`;
    let metaText;
    if (s.one_time_date) {
      const [y, m, d] = s.one_time_date.split('-');
      metaText = `<span class="badge once">Une fois</span> le ${d}/${m}/${y}`;
    } else {
      metaText = DAYS_LABELS[s.days] || s.days;
    }
    const label = s.label ? ` · ${s.label}` : '';
    return `<div class="sched-item ${s.enabled ? '' : 'disabled'}" data-id="${s.id}">
      <div class="sched-info">
        <div class="sched-time">${time} <span class="badge ${s.action}">${s.action === 'open' ? 'Ouvrir' : 'Fermer'}</span></div>
        <div class="sched-meta">${metaText}${label}</div>
      </div>
      <div class="sched-actions">
        <button class="icon-btn" onclick="toggleSched('${s.id}')" title="${s.enabled ? 'Désactiver' : 'Activer'}">${s.enabled ? '⏸' : '▶'}</button>
        <button class="icon-btn del" onclick="deleteSched('${s.id}')" title="Supprimer">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function addSchedule() {
  const [h, m] = document.getElementById('s-time').value.split(':');
  const once = document.getElementById('s-type').value === 'once';
  const body = {
    action: document.getElementById('s-action').value,
    hour: parseInt(h),
    minute: parseInt(m),
    days: once ? '*' : document.getElementById('s-days').value,
    one_time_date: once ? document.getElementById('s-date').value : null,
    label: document.getElementById('s-label').value,
    enabled: true
  };
  try {
    await api('/api/schedules', 'POST', body);
    toast('Programme ajouté');
    document.getElementById('s-label').value = '';
    loadSchedules();
  } catch(e) { toast('Erreur', 'err'); }
}

async function toggleSched(id) {
  await api('/api/schedules/' + id + '/toggle', 'PATCH');
  loadSchedules();
}

async function deleteSched(id) {
  await api('/api/schedules/' + id, 'DELETE');
  toast('Programme supprimé');
  loadSchedules();
}

async function loadConfig() {
  try {
    const d = await api('/api/esp32/config');
    if (d.travel_time_ms !== undefined) document.getElementById('c-travel').value = d.travel_time_ms / 1000;
    document.getElementById('c-stop-time').checked      = d.stop_on_time      ?? true;
    document.getElementById('c-stop-cur-open').checked  = d.stop_on_cur_open  ?? false;
    document.getElementById('c-stop-cur-close').checked = d.stop_on_cur_close ?? false;
    document.getElementById('c-soft-start').checked     = d.soft_start        ?? false;
    if (d.threshold_open  !== undefined) document.getElementById('c-thr-open').value  = d.threshold_open;
    if (d.threshold_close !== undefined) document.getElementById('c-thr-close').value = d.threshold_close;
    if (d.motor_speed !== undefined) setSpeedDisplay(d.motor_speed);
    document.getElementById('config-current').textContent = `WiFi : ${d.ssid1 || '—'}`;
  } catch { }
}

async function saveConfig() {
  const body = {};
  const travelSec = parseFloat(document.getElementById('c-travel').value);
  const travel    = Math.round(travelSec * 1000);
  const thrOpen  = parseInt(document.getElementById('c-thr-open').value);
  const thrClose = parseInt(document.getElementById('c-thr-close').value);
  body.stop_on_time      = document.getElementById('c-stop-time').checked;
  body.stop_on_cur_open  = document.getElementById('c-stop-cur-open').checked;
  body.stop_on_cur_close = document.getElementById('c-stop-cur-close').checked;
  body.soft_start        = document.getElementById('c-soft-start').checked;
  if (travel > 0)          body.travel_time_ms  = travel;
  if (thrOpen  > 0)        body.threshold_open  = thrOpen;
  if (thrClose > 0)        body.threshold_close = thrClose;
  try {
    await api('/api/esp32/config', 'POST', body);
    toast('Configuration envoyée à l\'ESP32');
    loadConfig();
  } catch(e) { toast('Erreur : ESP32 inaccessible', 'err'); }
}

async function rebootEsp32() {
  try {
    await api('/api/reboot', 'POST');
    toast('Redémarrage de l\'ESP32...');
  } catch { toast('Erreur : ESP32 inaccessible', 'err'); }
}

async function loadRetryConfig() {
  try {
    const d = await api('/api/retry-config');
    document.getElementById('retry-retries').value = d.retries;
    document.getElementById('retry-delay').value = d.delay;
  } catch {}
}

async function saveRetryConfig() {
  const retries = parseInt(document.getElementById('retry-retries').value);
  const delay = parseFloat(document.getElementById('retry-delay').value);
  const s = document.getElementById('retry-status');
  try {
    await api('/api/retry-config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ retries, delay }) });
    s.textContent = 'Enregistré.';
    setTimeout(() => s.textContent = '', 3000);
  } catch {
    s.textContent = 'Erreur lors de la sauvegarde.';
  }
}

async function uploadOTA() {
  const file = document.getElementById('ota-file').files[0];
  if (!file) { toast('Sélectionner un fichier .bin', 'err'); return; }
  if (!esp32Ip) { toast('IP ESP32 inconnue — attendre le statut', 'err'); return; }
  const btn = document.getElementById('ota-btn');
  const status = document.getElementById('ota-status');
  btn.disabled = true;
  status.textContent = 'Upload en cours (connexion directe ESP32)...';
  const form = new FormData();
  form.append('firmware', file, file.name);
  try {
    const r = await fetch(`http://${esp32Ip}/api/ota`, { method: 'POST', body: form });
    if (!r.ok) throw new Error(await r.text());
    status.textContent = 'Firmware flashé. ESP32 redémarre...';
    toast('OTA réussi — redémarrage ESP32');
  } catch(e) {
    if (e.name === 'TypeError') {
      status.textContent = 'Firmware flashé. ESP32 redémarre...';
      toast('OTA réussi — redémarrage ESP32');
    } else {
      status.textContent = 'Erreur : ' + e.message;
      toast('OTA échoué', 'err');
      btn.disabled = false;
    }
  }
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString('fr-FR', {
    timeZone: 'Europe/Paris',
    weekday: 'long', day: '2-digit', month: 'long', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}
updateClock();
setInterval(updateClock, 1000);

refreshStatus();
loadSchedules();
loadConfig();
loadRetryConfig();
setInterval(refreshStatus, 10000);
setInterval(pollCurrent, CURRENT_POLL_MS);
</script>
</body>
</html>
